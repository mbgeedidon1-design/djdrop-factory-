<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="author" content="Macdonald Barasa">
    <title>DJ Drop Factory Pro v5.0 — Live</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <style>
        /* ... your CSS from the original ... */
        /* (I've omitted the long CSS for brevity; keep your original styles) */
    </style>
</head>
<body>
    <!-- All HTML from your original index.html -->
    <!-- I've corrected the script portions below -->

    <div class="bg-glow"></div>
    <!-- ... all the HTML structure exactly as you had ... -->

    <script>
        // ==================== STATE ====================
        let currentScreen = 'screenHome';
        let currentMode = 'ai';
        let selectedEffect = 'none';
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let recordedBlob = null;
        let processedResult = null;
        let currentAudio = null;
        let isPlaying = false;
        let recordingTimer = null;
        let recordingSeconds = 0;
        let lastGeneratedDrop = null;
        let activeStream = null;
        let wizardStep = 1;
        let debounceTimer = null;
        let livePreviewDebounce = null;
        let liveEngine = null;
        let userCredits = 0;
        let userSubscription = 'free';
        let selectedPackage = null;
        let deviceId = localStorage.getItem('df_device_id') || 'dev_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('df_device_id', deviceId);

        // ==================== CLOCK ====================
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ==================== NAVIGATION ====================
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            if (screenId === 'screenHome') document.querySelectorAll('.tab-item')[0].classList.add('active');
            if (screenId === 'screenLibrary') document.querySelectorAll('.tab-item')[1].classList.add('active');
            if (screenId === 'screenDiscover') document.querySelectorAll('.tab-item')[2].classList.add('active');
            currentScreen = screenId;
            if (screenId === 'screenLibrary') renderLibrary();
            if (screenId === 'screenDiscover') loadDiscoverAll();
            if (screenId === 'screenSettings') loadUserCredits();
        }

        function goBack() { showScreen('screenHome'); }

        // ==================== MODE SWITCHING ====================
        function setMode(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.segment').forEach(s => s.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('aiForm').style.display = mode === 'ai' ? 'block' : 'none';
            document.getElementById('strictForm').style.display = mode === 'strict' ? 'block' : 'none';
            document.getElementById('trainingForm').style.display = mode === 'training' ? 'block' : 'none';
            if (mode !== 'ai') {
                const lp = document.getElementById('livePreviewCard');
                if (lp) lp.style.display = 'none';
            }
        }

        // ==================== WIZARD NAVIGATION ====================
        function wizardNext(step) {
            const data = gatherWizardData(step);
            fetch('/api/wizard_validate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({step: step, ...data})
            })
            .then(r => r.json())
            .then(res => {
                if (res.valid) {
                    document.getElementById(`wizardStep${step}`).classList.remove('active');
                    document.getElementById(`step${step}Indicator`).classList.remove('active');
                    document.getElementById(`step${step}Indicator`).classList.add('completed');
                    wizardStep = step + 1;
                    document.getElementById(`wizardStep${wizardStep}`).classList.add('active');
                    document.getElementById(`step${wizardStep}Indicator`).classList.add('active');
                    updateReview();
                } else {
                    showToast('❌ ' + (res.errors ? res.errors.join(', ') : 'Validation failed'));
                }
            })
            .catch(() => {
                // Fallback: allow navigation even if validation fails
                document.getElementById(`wizardStep${step}`).classList.remove('active');
                document.getElementById(`step${step}Indicator`).classList.remove('active');
                document.getElementById(`step${step}Indicator`).classList.add('completed');
                wizardStep = step + 1;
                document.getElementById(`wizardStep${wizardStep}`).classList.add('active');
                document.getElementById(`step${wizardStep}Indicator`).classList.add('active');
                updateReview();
            });
        }

        function wizardPrev(step) {
            document.getElementById(`wizardStep${step}`).classList.remove('active');
            document.getElementById(`step${step}Indicator`).classList.remove('active');
            wizardStep = step - 1;
            document.getElementById(`wizardStep${wizardStep}`).classList.add('active');
            document.getElementById(`step${wizardStep}Indicator`).classList.add('active');
            document.getElementById(`step${step}Indicator`).classList.remove('completed');
        }

        function gatherWizardData(step) {
            return {
                dj_name: document.getElementById('djName').value,
                city: document.getElementById('city').value,
                genre: document.getElementById('genre').value,
                drop_type: document.getElementById('dropType').value,
                energy: parseInt(document.getElementById('energy').value),
                voice: document.getElementById('voice').value
            };
        }

        function updateReview() {
            document.getElementById('reviewName').textContent = document.getElementById('djName').value || '—';
            document.getElementById('reviewCity').textContent = document.getElementById('city').value || '—';
            document.getElementById('reviewGenre').textContent = document.getElementById('genre').options[document.getElementById('genre').selectedIndex].text.replace(/^.\s/, '');
            document.getElementById('reviewType').textContent = document.getElementById('dropType').options[document.getElementById('dropType').selectedIndex].text.replace(/^.\s/, '');
            document.getElementById('reviewMood').textContent = document.getElementById('mood').options[document.getElementById('mood').selectedIndex].text.replace(/^.\s/, '');
            document.getElementById('reviewEnergy').textContent = document.getElementById('energy').value + '/10';
            document.getElementById('reviewVoice').textContent = document.getElementById('voice').options[document.getElementById('voice').selectedIndex].text.replace(/^.\s/, '');
        }

        // ==================== ENERGY SLIDER ====================
        const energySlider = document.getElementById('energy');
        const energyValue = document.getElementById('energyValue');
        function updateEnergyFill() {
            const min = parseFloat(energySlider.min);
            const max = parseFloat(energySlider.max);
            const pct = ((energySlider.value - min) / (max - min)) * 100;
            energySlider.style.setProperty('--progress', pct + '%');
            energyValue.textContent = energySlider.value;
        }
        energySlider.addEventListener('input', updateEnergyFill);
        updateEnergyFill();

        // ==================== TOGGLE SWITCH ====================
        function toggleSwitch(el) {
            el.classList.toggle('on');
            if (el.getAttribute('role') === 'switch') {
                el.setAttribute('aria-checked', el.classList.contains('on') ? 'true' : 'false');
            }
        }

        // ==================== TOAST ====================
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(showToast._t);
            showToast._t = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ==================== LOADING ====================
        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.add('show');
        }
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }

        // ==================== VISUALIZER ====================
        function initVisualizer() {
            const viz = document.getElementById('visualizer');
            viz.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const bar = document.createElement('div');
                bar.className = 'viz-bar';
                bar.style.height = '4px';
                viz.appendChild(bar);
            }
        }
        initVisualizer();

        // ==================== VOICE RECORDER ====================
        async function toggleRecording() {
            if (isRecording) stopRecording();
            else startRecording();
        }

        async function startRecording() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showToast('❌ Recording not supported');
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                activeStream = stream;
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    recordedBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
                    const url = URL.createObjectURL(recordedBlob);
                    document.getElementById('rawAudio').src = url;
                    document.getElementById('recordedPlayback').style.display = 'block';
                    document.getElementById('applyEffectBtn').disabled = false;
                    document.getElementById('visualizer').style.display = 'none';
                    clearInterval(recordingTimer);
                    stream.getTracks().forEach(t => t.stop());
                    activeStream = null;
                };
                mediaRecorder.start();
                isRecording = true;
                recordingSeconds = 0;
                document.getElementById('recorderRing').classList.add('recording');
                document.getElementById('recorderIcon').textContent = '⏹️';
                document.getElementById('recorderLabel').textContent = 'Recording... Tap to Stop';
                document.getElementById('recorderTime').style.display = 'block';
                document.getElementById('recorderTime').textContent = '00:00';
                document.getElementById('visualizer').style.display = 'flex';
                animateVisualizer();
                recordingTimer = setInterval(() => {
                    recordingSeconds++;
                    const mins = Math.floor(recordingSeconds / 60).toString().padStart(2, '0');
                    const secs = (recordingSeconds % 60).toString().padStart(2, '0');
                    document.getElementById('recorderTime').textContent = `${mins}:${secs}`;
                }, 1000);
            } catch (err) {
                showToast('❌ Microphone access denied');
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            isRecording = false;
            document.getElementById('recorderRing').classList.remove('recording');
            document.getElementById('recorderIcon').textContent = '🎙️';
            document.getElementById('recorderLabel').textContent = 'Tap to Record';
            document.getElementById('recorderTime').style.display = 'none';
            clearInterval(recordingTimer);
        }

        function animateVisualizer() {
            if (!isRecording) return;
            const bars = document.querySelectorAll('.viz-bar');
            bars.forEach(bar => { bar.style.height = (Math.random() * 45 + 4) + 'px'; });
            requestAnimationFrame(animateVisualizer);
        }

        // ==================== EFFECT SELECTION ====================
        function selectEffect(el) {
            document.querySelectorAll('.effect-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            selectedEffect = el.dataset.effect;
        }

        // ==================== APPLY VOICE EFFECT ====================
        async function applyVoiceEffect() {
            if (!recordedBlob) return;
            showLoading('Processing effect...');
            const formData = new FormData();
            formData.append('audio', recordedBlob, 'recording.webm');
            formData.append('effect', selectedEffect);
            try {
                const res = await fetch('/api/process_voice', { method: 'POST', body: formData });
                const data = await res.json();
                hideLoading();
                if (data.success) {
                    processedResult = data;
                    document.getElementById('processedAudio').src = data.audio_url;
                    document.getElementById('processedPlayback').style.display = 'block';
                    showToast(`✨ ${selectedEffect.toUpperCase()} effect applied!`);
                } else {
                    showToast('❌ Effect failed: ' + (data.error || 'unknown'));
                }
            } catch (err) {
                hideLoading();
                showToast('❌ Network error');
            }
        }

        function useAsBackground() { showToast('🎵 Voice effect set as background track'); }

        // ==================== STRING TOOLS ====================
        async function applyStringTool(operation) {
            const ta = document.getElementById('customScript');
            const text = ta.value;
            if (!text) { showToast('⚠️ Enter text first'); return; }
            try {
                const res = await fetch('/api/string_tools', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: text, operation: operation, genre: document.getElementById('genre').value})
                });
                const data = await res.json();
                if (data.success) {
                    ta.value = data.result;
                    showToast(`✅ ${operation.replace('_', ' ')} applied!`);
                }
            } catch (e) {
                // fallback basic operations
                if (operation === 'capitalize') {
                    ta.value = text.replace(/\b\w/g, c => c.toUpperCase());
                } else if (operation === 'auto_punctuate') {
                    ta.value = text.trim() + (text.trim().slice(-1).match(/[.!?]/) ? '' : '!');
                } else if (operation === 'stutter_classic') {
                    const first = text.trim().split(' ')[0];
                    ta.value = first[0] + '-' + first[0] + '-' + first[0] + '-' + text;
                }
                showToast('✅ Applied (offline mode)');
            }
        }

        function copyScript() {
            const script = document.getElementById('resultScript').textContent;
            if (script) {
                navigator.clipboard.writeText(script).then(() => showToast('📋 Copied!'));
            }
        }

        // ==================== WEB DATA INTEGRATION ====================
        async function fetchTrendingGenres() {
            try {
                const res = await fetch('/api/trends');
                const data = await res.json();
                if (data.success && data.trending) {
                    const row = document.getElementById('trendingGenres');
                    row.innerHTML = data.trending.slice(0, 4).map(g => 
                        `<span class="suggestion-chip" onclick="document.getElementById('genre').value='${g.toLowerCase().replace(/\s+/g, '_')}';showToast('🎵 ${g} selected')">${g}</span>`
                    ).join('');
                    row.style.display = 'flex';
                }
            } catch (e) { console.log('Trends offline'); }
        }

        // ==================== FIXED CITY VIBE ====================
        async function fetchCityVibe() {
            const city = document.getElementById('city').value.trim();
            if (!city) {
                document.getElementById('cityVibe').style.display = 'none';
                return;
            }
            try {
                const res = await fetch(`/api/city_vibe?city=${encodeURIComponent(city)}`);
                const data = await res.json();
                if (data.success) {
                    const v = data.data;
                    const el = document.getElementById('cityVibe');
                    el.textContent = `🌆 ${v.vibe} • Mood: ${v.mood}`;
                    el.style.display = 'block';
                    // Set suggested mood if available
                    if (v.mood) {
                        const moodSelect = document.getElementById('mood');
                        for (let i = 0; i < moodSelect.options.length; i++) {
                            if (moodSelect.options[i].value === v.mood) {
                                moodSelect.selectedIndex = i;
                                break;
                            }
                        }
                    }
                }
            } catch (e) { console.log('City vibe offline'); }
        }

        async function fetchNameSuggestions() {
            const genre = document.getElementById('genre').value;
            try {
                const res = await fetch(`/api/suggest_names?style=${encodeURIComponent(genre)}`);
                const data = await res.json();
                if (data.success && data.suggestions) {
                    const row = document.getElementById('nameSuggestions');
                    row.innerHTML = data.suggestions.slice(0, 4).map(n => 
                        `<span class="suggestion-chip" onclick="document.getElementById('djName').value='${n.replace(/'/g, "\\'")}';showToast('🎤 ${n} selected')">${n}</span>`
                    ).join('');
                    row.style.display = 'flex';
                }
            } catch (e) { console.log('Names offline'); }
        }

        function onGenreChange() {
            fetchNameSuggestions();
            fetchTrendingGenres();
        }

        document.getElementById('city').addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(fetchCityVibe, 800);
        });

        // ==================== GENERATE DROP ====================
        async function generateDrop() {
            showLoading('Generating your premium drop...');

            const data = {
                mode: currentMode,
                dj_name: (currentMode === 'training' ? document.getElementById('trainDjName').value : document.getElementById('djName').value) || 'DJ Beshi',
                genre: document.getElementById('genre').value,
                drop_type: document.getElementById('dropType').value,
                mood: document.getElementById('mood').value,
                energy: parseInt(document.getElementById('energy').value, 10),
                voice: document.getElementById('voice').value,
                city: document.getElementById('city').value,
                use_stutter: document.getElementById('autoStutterToggle').classList.contains('on'),
                custom_script: currentMode === 'strict' ? document.getElementById('customScript').value : '',
                training_example: currentMode === 'training' ? document.getElementById('trainingExample').value : '',
                user_stutter: document.getElementById('userStutter').value
            };

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Device-ID': deviceId
                    },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                hideLoading();

                if (result.success) {
                    lastGeneratedDrop = result;
                    document.getElementById('resultScript').textContent = result.script;
                    document.getElementById('resultAudio').src = result.download_url;
                    document.getElementById('resultsArea').style.display = 'block';
                    
                    const badge = document.getElementById('resultBadge');
                    if (result.offline) {
                        badge.textContent = '⚠️ Basic Audio Mode';
                        badge.style.background = 'rgba(247, 197, 49, 0.1)';
                        badge.style.color = 'var(--warning)';
                    } else {
                        badge.textContent = '✅ Neural Voice + LOUD FX';
                        badge.style.background = 'rgba(0, 208, 132, 0.1)';
                        badge.style.color = 'var(--success)';
                    }
                    document.getElementById('resultsArea').scrollIntoView({ behavior: 'smooth' });
                    showToast('🔥 Drop generated successfully!');
                    localStorage.removeItem('df_draft');
                    if (liveEngine) liveEngine.clearServerDraft();
                    // Update credits display
                    if (result.credits_remaining !== undefined) {
                        userCredits = result.credits_remaining;
                        updateCreditDisplay();
                    }
                } else if (result.error === 'insufficient_credits') {
                    showToast('❌ ' + (result.message || 'No credits left'));
                    showPaymentModal();
                } else {
                    showToast('❌ Generation failed: ' + (result.error || 'unknown'));
                }
            } catch (err) {
                hideLoading();
                showToast('❌ Network error');
            }
        }

        // ==================== SAVE TO LIBRARY ====================
        async function saveToLibrary() {
            if (!lastGeneratedDrop) return;
            const drop = {
                id: Date.now(),
                title: lastGeneratedDrop.script.length > 50 ? lastGeneratedDrop.script.substring(0, 50) + '...' : lastGeneratedDrop.script,
                script: lastGeneratedDrop.script,
                url: lastGeneratedDrop.download_url,
                genre: document.getElementById('genre').value,
                date: new Date().toLocaleDateString(),
                project: lastGeneratedDrop.project,
                dj_name: document.getElementById('djName').value || 'DJ Beshi'
            };
            try {
                const res = await fetch('/api/library', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(drop)
                });
                if (!res.ok) throw new Error('Server rejected save');
                showToast('💾 Saved to Library!');
            } catch (err) {
                let library = JSON.parse(localStorage.getItem('djDrops') || '[]');
                library.unshift(drop);
                localStorage.setItem('djDrops', JSON.stringify(library));
                showToast('💾 Saved locally (offline)');
            }
        }

        // ==================== LIBRARY ====================
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str == null ? '' : String(str);
            return div.innerHTML;
        }

        async function renderLibrary() {
            const list = document.getElementById('libraryList');
            const empty = document.getElementById('libraryEmpty');
            const countEl = document.getElementById('libraryCount');
            let library = [];
            try {
                const res = await fetch('/api/library');
                const data = await res.json();
                if (data.success) library = data.drops;
                else throw new Error('bad response');
            } catch (err) {
                library = JSON.parse(localStorage.getItem('djDrops') || '[]');
            }
            countEl.textContent = `${library.length} drop${library.length !== 1 ? 's' : ''} saved`;
            if (library.length === 0) {
                list.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';
            list.innerHTML = library.map(drop => `
                <div class="library-item" data-id="${escapeHtml(drop.id)}" data-url="${escapeHtml(drop.url)}" data-title="${escapeHtml(drop.title)}">
                    <div class="library-art">🎵</div>
                    <div class="library-info">
                        <div class="library-title">${escapeHtml(drop.title)}</div>
                        <div class="library-meta">${escapeHtml(drop.genre || 'Unknown')} • ${escapeHtml(drop.date)}</div>
                    </div>
                    <div class="library-play" data-action="play">▶️</div>
                    <button class="delete-btn" data-action="delete" aria-label="Delete drop">🗑️</button>
                </div>
            `).join('');
        }

        document.getElementById('libraryList').addEventListener('click', (e) => {
            const item = e.target.closest('.library-item');
            if (!item) return;
            const action = e.target.closest('[data-action]')?.dataset.action;
            const id = item.dataset.id;
            const url = item.dataset.url;
            const title = item.dataset.title;
            if (action === 'delete') { e.stopPropagation(); deleteDrop(id); }
            else { playDrop(url, title); }
        });

        async function deleteDrop(id) {
            try {
                const res = await fetch(`/api/library/${encodeURIComponent(id)}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Server rejected delete');
            } catch (err) {
                let library = JSON.parse(localStorage.getItem('djDrops') || '[]');
                library = library.filter(d => String(d.id) !== String(id));
                localStorage.setItem('djDrops', JSON.stringify(library));
            }
            showToast('🗑️ Drop deleted');
            renderLibrary();
        }

        function playDrop(url, title) {
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            currentAudio = new Audio(url);
            currentAudio.play().catch(() => showToast('❌ Could not play audio'));
            isPlaying = true;
            document.getElementById('playerTitle').textContent = title.length > 25 ? title.substring(0, 25) + '...' : title;
            document.getElementById('playerArtist').textContent = 'DJ Beshi';
            document.getElementById('playerPlayBtn').textContent = '⏸️';
            document.getElementById('playerBar').classList.add('show');
            currentAudio.onended = () => {
                isPlaying = false;
                document.getElementById('playerPlayBtn').textContent = '▶️';
            };
        }

        function togglePlayer() {
            if (!currentAudio) return;
            if (isPlaying) {
                currentAudio.pause();
                document.getElementById('playerPlayBtn').textContent = '▶️';
            } else {
                currentAudio.play();
                document.getElementById('playerPlayBtn').textContent = '⏸️';
            }
            isPlaying = !isPlaying;
        }

        // ==================== STATUS CHECK ====================
        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const statusText = document.getElementById('statusText');
                const webInd = document.getElementById('webIndicator');
                const wifiIcon = document.getElementById('wifiIcon');
                if (data.online && data.ffmpeg_available) {
                    statusText.textContent = 'Ready to generate';
                    webInd.textContent = '🌐 Live';
                    webInd.classList.remove('offline');
                    wifiIcon.textContent = '📶';
                } else if (data.ffmpeg_available) {
                    statusText.textContent = 'Offline mode - Basic audio';
                    webInd.textContent = '📴 Offline';
                    webInd.classList.add('offline');
                    wifiIcon.textContent = '✈️';
                } else {
                    statusText.textContent = 'Script only mode';
                    webInd.textContent = '⚠️ Limited';
                    webInd.classList.add('offline');
                    wifiIcon.textContent = '⚠️';
                }
            } catch (e) {
                document.getElementById('statusText').textContent = 'Server offline';
                document.getElementById('webIndicator').textContent = '📴 Offline';
                document.getElementById('webIndicator').classList.add('offline');
                document.getElementById('wifiIcon').textContent = '✈️';
            }
        }

        // ==================== LIVE ENGINE ====================
        class LiveEngine {
            constructor() {
                this.sessionId = this.getSessionId();
                this.setupAutoSave();
                this.setupLivePreview();
                this.setupHeartbeat();
                this.setupNetworkStatus();
                this.setupVisibilityRefresh();
                this.setupBeforeUnload();
                this.setupPullToRefresh();
                this.checkRecovery();
            }

            getSessionId() {
                let id = localStorage.getItem('df_session_id');
                if (!id) {
                    id = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('df_session_id', id);
                }
                return id;
            }

            setupAutoSave() {
                setInterval(() => this.saveLocalDraft(), 2000);
                setInterval(() => this.syncDraftToServer(), 10000);
                const inputs = document.querySelectorAll('input, select, textarea');
                inputs.forEach(el => el.addEventListener('input', () => this.saveLocalDraft()));
            }

            saveLocalDraft() {
                const draft = {
                    mode: currentMode,
                    djName: document.getElementById('djName')?.value,
                    city: document.getElementById('city')?.value,
                    genre: document.getElementById('genre')?.value,
                    dropType: document.getElementById('dropType')?.value,
                    mood: document.getElementById('mood')?.value,
                    energy: document.getElementById('energy')?.value,
                    voice: document.getElementById('voice')?.value,
                    customScript: document.getElementById('customScript')?.value,
                    trainingExample: document.getElementById('trainingExample')?.value,
                    userStutter: document.getElementById('userStutter')?.value,
                    timestamp: Date.now()
                };
                localStorage.setItem('df_draft', JSON.stringify(draft));
            }

            async syncDraftToServer() {
                if (!navigator.onLine) return;
                const draft = localStorage.getItem('df_draft');
                if (!draft) return;
                try {
                    await fetch('/api/draft', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Session-ID': this.sessionId
                        },
                        body: draft
                    });
                } catch(e) {}
            }

            async clearServerDraft() {
                try {
                    await fetch('/api/draft', {
                        method: 'DELETE',
                        headers: {'X-Session-ID': this.sessionId}
                    });
                } catch(e) {}
            }

            checkRecovery() {
                const draft = localStorage.getItem('df_draft');
                if (!draft) return;
                const data = JSON.parse(draft);
                if (Date.now() - data.timestamp > 24 * 60 * 60 * 1000) {
                    localStorage.removeItem('df_draft');
                    return;
                }
                const banner = document.getElementById('recoveryBanner');
                if (banner) banner.style.display = 'flex';
            }

            async restoreDraft() {
                let draft = null;
                if (navigator.onLine) {
                    try {
                        const res = await fetch('/api/draft', {headers: {'X-Session-ID': this.sessionId}});
                        const data = await res.json();
                        if (data.success && data.draft) draft = data.draft;
                    } catch(e) {}
                }
                if (!draft) {
                    const local = localStorage.getItem('df_draft');
                    if (local) draft = JSON.parse(local);
                }
                if (draft && Date.now() - draft.timestamp < 24*60*60*1000) {
                    this.applyDraft(draft);
                    showToast('🔄 Draft restored');
                }
            }

            applyDraft(draft) {
                if (draft.djName) document.getElementById('djName').value = draft.djName;
                if (draft.city) document.getElementById('city').value = draft.city;
                if (draft.genre) document.getElementById('genre').value = draft.genre;
                if (draft.dropType) document.getElementById('dropType').value = draft.dropType;
                if (draft.mood) document.getElementById('mood').value = draft.mood;
                if (draft.energy) {
                    document.getElementById('energy').value = draft.energy;
                    updateEnergyFill();
                }
                if (draft.voice) document.getElementById('voice').value = draft.voice;
                if (draft.customScript) document.getElementById('customScript').value = draft.customScript;
                if (draft.trainingExample) document.getElementById('trainingExample').value = draft.trainingExample;
                if (draft.userStutter) document.getElementById('userStutter').value = draft.userStutter;
                if (draft.mode) {
                    const modeIndex = {'ai': 0, 'strict': 1, 'training': 2}[draft.mode] || 0;
                    const seg = document.querySelectorAll('.segment')[modeIndex];
                    if (seg) setMode(draft.mode, seg);
                }
                onGenreChange();
                fetchCityVibe();
            }

            setupLivePreview() {
                const liveInputs = ['djName', 'city', 'genre', 'dropType', 'mood', 'energy', 'userStutter'];
                const handler = () => {
                    clearTimeout(livePreviewDebounce);
                    livePreviewDebounce = setTimeout(() => this.fetchLivePreview(), 700);
                };
                liveInputs.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.addEventListener('input', handler);
                });
            }

            async fetchLivePreview() {
                if (currentMode !== 'ai') return;
                const data = {
                    dj_name: document.getElementById('djName').value || 'DJ Beshi',
                    genre: document.getElementById('genre').value,
                    drop_type: document.getElementById('dropType').value,
                    mood: document.getElementById('mood').value,
                    energy: parseInt(document.getElementById('energy').value),
                    city: document.getElementById('city').value,
                    use_stutter: document.getElementById('autoStutterToggle').classList.contains('on'),
                    user_stutter: document.getElementById('userStutter').value
                };
                try {
                    const res = await fetch('/api/live_preview', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                    const result = await res.json();
                    if (result.success) {
                        this.showLivePreview(result.best);
                    }
                } catch(e) {}
            }

            showLivePreview(text) {
                let card = document.getElementById('livePreviewCard');
                if (!card) return;
                const txt = document.getElementById('livePreviewText');
                txt.textContent = text;
                card.style.display = 'block';
            }

            setupHeartbeat() {
                this.heartbeat();
                setInterval(() => this.heartbeat(), 30000);
            }

            async heartbeat() {
                if (!navigator.onLine) return;
                try {
                    const res = await fetch('/api/heartbeat');
                    const data = await res.json();
                    if (data.success) {
                        const statusText = document.getElementById('statusText');
                        const webInd = document.getElementById('webIndicator');
                        const wifiIcon = document.getElementById('wifiIcon');
                        if (data.online && data.ffmpeg) {
                            statusText.textContent = 'Ready to generate';
                            webInd.textContent = '🌐 Live';
                            webInd.classList.remove('offline');
                            wifiIcon.textContent = '📶';
                        } else if (data.ffmpeg) {
                            statusText.textContent = 'Offline mode';
                            webInd.textContent = '📴 Offline';
                            webInd.classList.add('offline');
                            wifiIcon.textContent = '✈️';
                        }
                        if (data.trending && data.trending.length > 0) {
                            const chipRow = document.getElementById('trendingGenres');
                            if (chipRow) {
                                chipRow.innerHTML = data.trending.map(g => 
                                    `<span class="suggestion-chip" onclick="document.getElementById('genre').value='${g.toLowerCase().replace(/\\s+/g, '_')}';showToast('🎵 ${g} selected')">${g}</span>`
                                ).join('');
                                chipRow.style.display = 'flex';
                            }
                        }
                    }
                } catch(e) {}
            }

            setupNetworkStatus() {
                window.addEventListener('online', () => {
                    showToast('🌐 Back online! Syncing...');
                    this.syncDraftToServer();
                    this.heartbeat();
                    checkStatus();
                });
                window.addEventListener('offline', () => {
                    showToast('📴 Offline mode. Data saved locally.');
                    const webInd = document.getElementById('webIndicator');
                    const wifiIcon = document.getElementById('wifiIcon');
                    if (webInd) {
                        webInd.textContent = '📴 Offline';
                        webInd.classList.add('offline');
                    }
                    if (wifiIcon) wifiIcon.textContent = '✈️';
                });
            }

            setupVisibilityRefresh() {
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) {
                        this.heartbeat();
                        checkStatus();
                        if (currentScreen === 'screenLibrary') renderLibrary();
                        loadUserCredits();
                    }
                });
            }

            setupBeforeUnload() {
                window.addEventListener('beforeunload', (e) => {
                    const loading = document.getElementById('loadingOverlay');
                    if (loading && loading.classList.contains('show')) {
                        e.preventDefault();
                        e.returnValue = 'Generation in progress. Are you sure?';
                    }
                    this.saveLocalDraft();
                    this.syncDraftToServer();
                });
            }

            setupPullToRefresh() {
                let touchStartY = 0;
                let isPulling = false;
                const pullHint = document.getElementById('pullHint');
                document.addEventListener('touchstart', e => {
                    if (window.scrollY <= 5) {
                        touchStartY = e.touches[0].clientY;
                        isPulling = true;
                    }
                }, {passive: true});
                document.addEventListener('touchmove', e => {
                    if (!isPulling || window.scrollY > 5) return;
                    const diff = e.touches[0].clientY - touchStartY;
                    if (diff > 60 && diff < 140) {
                        pullHint.classList.add('show');
                    }
                }, {passive: true});
                document.addEventListener('touchend', e => {
                    if (!isPulling) return;
                    const diff = e.changedTouches[0].clientY - touchStartY;
                    pullHint.classList.remove('show');
                    if (diff > 100 && window.scrollY <= 5) {
                        showToast('🔄 Refreshing live data...');
                        checkStatus();
                        fetchTrendingGenres();
                        fetchNameSuggestions();
                        this.heartbeat();
                        if (currentScreen === 'screenLibrary') renderLibrary();
                        loadUserCredits();
                    }
                    isPulling = false;
                }, {passive: true});
            }
        }

        // ==================== DISCOVER SCREEN LOGIC ====================
        async function loadDiscoverAll() {
            await showDiscoverList('all');
        }

        async function showDiscoverList(type) {
            const list = document.getElementById('discoverList');
            list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">Loading...</div>';
            try {
                let url = `/api/${type}`;
                if (type === 'all') url = '/api/all';
                const res = await fetch(url);
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                
                let items = [];
                if (type === 'all') {
                    Object.values(data.data).forEach(arr => items.push(...arr));
                } else if (type === 'dj-groups') {
                    items = data.dj_groups;
                } else if (type === 'streaming-apps') {
                    items = data.streaming_apps;
                } else if (type === 'dj-software') {
                    items = data.dj_software;
                } else if (type === 'festivals') {
                    items = data.festivals;
                } else if (type === 'theater-streaming') {
                    items = data.theater_streaming;
                }
                
                renderDiscoverItems(items, type);
            } catch (e) {
                list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--error);">Failed to load: ${e.message}</div>`;
            }
        }

        function renderDiscoverItems(items, type) {
            const list = document.getElementById('discoverList');
            if (items.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No results</div></div>';
                return;
            }
            list.innerHTML = items.map(item => {
                let title = item.name || item.title || 'Unknown';
                let meta = [];
                let tags = [];
                
                if (type === 'dj-groups' || item.style) {
                    if (item.origin) meta.push(item.origin);
                    if (item.style) meta.push(item.style);
                    if (item.activities) meta.push(item.activities.substring(0, 60) + '...');
                } else if (type === 'streaming-apps' || item.catalog_size) {
                    if (item.category) tags.push(item.category);
                    if (item.price) meta.push(item.price);
                    if (item.platform) meta.push(item.platform);
                    if (item.free_tier) tags.push('Free Tier');
                } else if (type === 'dj-software' || item.platform) {
                    if (item.category) tags.push(item.category);
                    if (item.platform) meta.push(item.platform);
                    if (item.price) meta.push(item.price);
                } else if (type === 'festivals' || item.dates) {
                    if (item.location) meta.push(item.location);
                    if (item.dates) meta.push(item.dates);
                    if (item.genre) tags.push(item.genre);
                } else if (type === 'theater-streaming' || item.content_type) {
                    if (item.content_type) meta.push(item.content_type);
                    if (item.region) meta.push(item.region);
                }
                
                return `
                    <div class="data-item">
                        <div class="data-item-title">${escapeHtml(title)}</div>
                        <div class="data-item-meta">${escapeHtml(meta.join(' • '))}</div>
                        ${tags.map(t => `<span class="data-item-tag">${escapeHtml(t)}</span>`).join('')}
                    </div>
                `;
            }).join('');
        }

        let searchDebounce;
        function debounceSearch(term) {
            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(() => {
                if (!term.trim()) {
                    loadDiscoverAll();
                    return;
                }
                fetch(`/api/search?q=${encodeURIComponent(term)}`)
                    .then(r => r.json())
                    .then(data => {
                        if (data.success) {
                            let all = [];
                            Object.values(data.results).forEach(arr => all.push(...arr));
                            renderDiscoverItems(all, 'search');
                        }
                    })
                    .catch(() => showToast('❌ Search failed'));
            }, 400);
        }

        // ==================== PAYMENT SYSTEM ====================
        async function loadUserCredits() {
            try {
                const res = await fetch('/api/user/credits', {
                    headers: {'X-Device-ID': deviceId}
                });
                const data = await res.json();
                if (data.success) {
                    userCredits = data.credits;
                    userSubscription = data.subscription;
                    updateCreditDisplay();
                }
            } catch (e) { console.log('Credits load failed'); }
        }

        function updateCreditDisplay() {
            const pill = document.getElementById('creditPill');
            const text = document.getElementById('creditText');
            const settingsTitle = document.getElementById('settingsPlanTitle');
            const settingsDesc = document.getElementById('settingsCreditsDesc');
            
            pill.style.display = 'flex';
            
            if (userSubscription === 'premium') {
                text.textContent = '∞ Premium';
                settingsTitle.textContent = 'Premium Plan';
                settingsDesc.textContent = 'Unlimited drops active';
            } else {
                text.textContent = `${userCredits} drops`;
                settingsTitle.textContent = userCredits > 0 ? 'Free Plan' : 'Free Plan (No Credits)';
                settingsDesc.textContent = `${userCredits} drops remaining — Tap to buy more`;
            }
        }

        async function showPaymentModal() {
            document.getElementById('paymentModal').classList.add('show');
            // Load packages
            try {
                const res = await fetch('/api/payment/packages');
                const data = await res.json();
                if (data.success) {
                    const container = document.getElementById('packagesContainer');
                    container.innerHTML = data.packages.map((pkg, idx) => `
                        <div class="package-card ${pkg.id === 'standard' ? 'popular' : ''} ${idx === 1 ? 'selected' : ''}" 
                             onclick="selectPackage('${pkg.id}', this)" 
                             data-id="${pkg.id}" data-credits="${pkg.credits}" data-price="${pkg.price}" data-days="${pkg.duration_days || 0}">
                            <div class="package-name">${pkg.name}</div>
                            <div class="package-price">${data.currency} ${pkg.price}<span> / ${pkg.subscription ? (pkg.duration_days > 30 ? 'year' : 'month') : 'one-time'}</span></div>
                            <div class="package-desc">${pkg.description}</div>
                        </div>
                    `).join('');
                    // Auto-select standard
                    selectedPackage = data.packages[1];
                }
            } catch (e) { showToast('❌ Failed to load packages'); }
        }

        function closePaymentModal() {
            document.getElementById('paymentModal').classList.remove('show');
        }

        function selectPackage(id, el) {
            document.querySelectorAll('.package-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedPackage = {
                id: id,
                credits: parseInt(el.dataset.credits),
                price: parseInt(el.dataset.price),
                days: parseInt(el.dataset.days) || 0
            };
        }

        async function initiatePayment() {
            const phone = document.getElementById('paymentPhone').value.trim();
            if (!phone || phone.length < 10) {
                showToast('⚠️ Enter a valid phone number');
                return;
            }
            if (!selectedPackage) {
                showToast('⚠️ Select a package first');
                return;
            }
            
            const btn = document.getElementById('payBtn');
            btn.disabled = true;
            btn.textContent = 'Processing...';
            
            try {
                const res = await fetch('/api/payment/initiate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Device-ID': deviceId
                    },
                    body: JSON.stringify({
                        package_id: selectedPackage.id,
                        phone: phone,
                        method: 'mpesa'
                    })
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast('📱 Check your phone for payment prompt');
                    // Poll for verification (mock mode auto-verifies)
                    setTimeout(() => verifyPayment(data.tx_ref), 3000);
                } else {
                    showToast('❌ ' + (data.error || 'Payment failed'));
                }
            } catch (e) {
                showToast('❌ Network error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Pay & Unlock';
            }
        }

        async function verifyPayment(tx_ref) {
            try {
                const res = await fetch('/api/payment/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Device-ID': deviceId
                    },
                    body: JSON.stringify({tx_ref: tx_ref, mock_verify: true})
                });
                const data = await res.json();
                if (data.success && data.status === 'success') {
                    showToast(`✅ ${data.credits_added > 9000 ? 'Premium activated' : data.credits_added + ' credits added'}!`);
                    closePaymentModal();
                    loadUserCredits();
                } else {
                    showToast('⏳ Payment pending... Check again soon');
                }
            } catch (e) {
                showToast('❌ Verification failed');
            }
        }

        // ==================== PWA ====================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js').catch(() => {});
        }

        window.addEventListener('beforeunload', () => {
            if (activeStream) activeStream.getTracks().forEach(t => t.stop());
        });

        // ==================== INIT ====================
        checkStatus();
        fetchTrendingGenres();
        fetchNameSuggestions();
        liveEngine = new LiveEngine();
        loadUserCredits();
    </script>
</body>
</html>
